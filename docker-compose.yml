services:
  zrelay:
    image: ghcr.io/attid/zrelay:latest
    ports:
      - "${PORT:-8000}:8000"  # External port mapping
    environment:
      - Z_AI_API_KEY=${Z_AI_API_KEY:?}
      # - DATABASE_URL=sqlite+aiosqlite:///data/stats.db  # SQLite DB path
      # - ADMIN_PASSWORD=${ADMIN_PASSWORD:?}  # Required! Auto-generated if not set
      # - LOG_LEVEL=${LOG_LEVEL:-INFO}  # Logging level
      # - SEARCH_MCP_URL=https://api.z.ai/api/mcp/web_search_prime/sse
      # - READER_MCP_URL=https://api.z.ai/api/mcp/web_reader/sse
      # - ZREAD_MCP_URL=https://api.z.ai/api/mcp/zread/sse
    volumes:
      - zrelay_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

volumes:
  zrelay_data:
